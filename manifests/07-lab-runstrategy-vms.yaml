# Three fedora VMs on RWO Ceph, one per runStrategy, to see which one a fence brings back.
# Result: Always and RerunOnFailure both recover after a fence; Manual stays down.
# Clean guest shutdown: Always restarts anyway, RerunOnFailure stays off -> use RerunOnFailure.
# Put them on one node (cordon the others during create), then fence that node.
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata: { name: vm-always, namespace: fencing-lab }
spec:
  runStrategy: Always
  dataVolumeTemplates:
    - metadata: { name: vm-always-disk }
      spec:
        sourceRef: { kind: DataSource, name: fedora, namespace: openshift-virtualization-os-images }
        storage:
          accessModes: [ReadWriteOnce]
          storageClassName: ceph-rbd-virtualization
          resources: { requests: { storage: 30Gi } }
  template:
    metadata: { labels: { kubevirt.io/domain: vm-always } }
    spec:
      evictionStrategy: None
      domain:
        cpu: { cores: 1 }
        memory: { guest: 2Gi }
        devices:
          disks: [ { name: root, disk: { bus: virtio } } ]
          interfaces: [ { name: default, masquerade: {} } ]
      networks: [ { name: default, pod: {} } ]
      volumes:
        - name: root
          dataVolume: { name: vm-always-disk }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata: { name: vm-rerun, namespace: fencing-lab }
spec:
  runStrategy: RerunOnFailure
  dataVolumeTemplates:
    - metadata: { name: vm-rerun-disk }
      spec:
        sourceRef: { kind: DataSource, name: fedora, namespace: openshift-virtualization-os-images }
        storage:
          accessModes: [ReadWriteOnce]
          storageClassName: ceph-rbd-virtualization
          resources: { requests: { storage: 30Gi } }
  template:
    metadata: { labels: { kubevirt.io/domain: vm-rerun } }
    spec:
      evictionStrategy: None
      domain:
        cpu: { cores: 1 }
        memory: { guest: 2Gi }
        devices:
          disks: [ { name: root, disk: { bus: virtio } } ]
          interfaces: [ { name: default, masquerade: {} } ]
      networks: [ { name: default, pod: {} } ]
      volumes:
        - name: root
          dataVolume: { name: vm-rerun-disk }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata: { name: vm-manual, namespace: fencing-lab }
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - metadata: { name: vm-manual-disk }
      spec:
        sourceRef: { kind: DataSource, name: fedora, namespace: openshift-virtualization-os-images }
        storage:
          accessModes: [ReadWriteOnce]
          storageClassName: ceph-rbd-virtualization
          resources: { requests: { storage: 30Gi } }
  template:
    metadata: { labels: { kubevirt.io/domain: vm-manual } }
    spec:
      evictionStrategy: None
      domain:
        cpu: { cores: 1 }
        memory: { guest: 2Gi }
        devices:
          disks: [ { name: root, disk: { bus: virtio } } ]
          interfaces: [ { name: default, masquerade: {} } ]
      networks: [ { name: default, pod: {} } ]
      volumes:
        - name: root
          dataVolume: { name: vm-manual-disk }
